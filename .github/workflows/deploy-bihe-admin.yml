name: Deploy BIHE Admin to Hostinger (FTP)

on:
  push:
    branches:
      - main
    paths:
      - "Backend/**"
      - ".github/workflows/deploy-bihe-admin.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Log planned changes only (no upload)
        type: boolean
        default: false

concurrency:
  group: deploy-Backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and FTP deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, fileinfo, pdo_mysql, tokenizer, openssl, json
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('Backend/composer.lock', 'Backend/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: Backend/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          log-level: minimal
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/.env.backup
            **/.env.production
            **/tests/**
            **/.phpunit.cache/**
            **/.phpunit.result.cache/**
            **/.idea/**
            **/.vscode/**
            **/.DS_Store
            **/docker-compose.yml
            **/Dockerfile
            **/html-frontend/**
            **/.ftp-deploy-sync-state.json
            **/database/database.sqlite
            **/storage/logs/**
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**

      - name: Post-deploy on Hostinger (SSH migrate + cache)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.SSH_REMOTE_DIR }}"
            PHP="${{ secrets.SSH_PHP_BIN || '/opt/alt/php85/usr/bin/php' }}"
            "$PHP" artisan migrate --force
            "$PHP" artisan config:cache
            "$PHP" artisan route:cache
            "$PHP" artisan view:cache
            echo "Post-deploy complete."
