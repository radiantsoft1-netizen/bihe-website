name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nextjs:
              - 'Frontend/src/**'
              - 'Frontend/public/**'
              - 'Frontend/scripts/**'
              - 'Frontend/package.json'
              - 'Frontend/package-lock.json'
              - 'Frontend/tsconfig.json'
              - 'Frontend/next.config.*'
              - 'Frontend/eslint.config.*'
              - 'Frontend/.env.example'
              - 'package.json'
            backend:
              - 'Backend/**'
              - '!Backend/vendor/**'

  verify-nextjs:
    name: Next.js verify (tsc + lint)
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix Frontend

      - name: Type-check and lint
        run: npm run verify --prefix Frontend

  php-syntax:
    name: PHP syntax check (Backend)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Lint PHP files
        run: |
          find app bootstrap config database public routes -name '*.php' -print0 \
            | xargs -0 -n1 php -l
