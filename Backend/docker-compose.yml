# Local development only — not deployed to Hostinger (excluded from FTP workflow).
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: bihe_admin
      DB_USERNAME: bihe
      DB_PASSWORD: bihe_secret
      SESSION_DRIVER: database
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      ADMIN_NAME: "BIHE Super Admin"
      ADMIN_USERNAME: superadmin
      ADMIN_EMAIL: admin@bihe.edu
      ADMIN_PASSWORD: change-me-secure-password
      STAFF_NAME: "BIHE Staff"
      STAFF_USERNAME: staff
      STAFF_EMAIL: staff@bihe.edu
      STAFF_PASSWORD: change-me-staff-password
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "cp -n .env.example .env 2>/dev/null || true
      && php artisan key:generate --force
      && php artisan migrate --force --seed
      && php artisan storage:link
      && php -d upload_max_filesize=20M -d post_max_size=22M artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bihe_admin
      MYSQL_USER: bihe
      MYSQL_PASSWORD: bihe_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - bihe_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bihe_mysql:
